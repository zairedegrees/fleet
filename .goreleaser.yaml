version: 2

project_name: fleet

before:
  hooks:
    - go mod tidy

builds:
  - id: fleet
    main: ./cmd/fleet
    binary: fleet
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/zairedegrees/fleet/internal/version.Version={{ .Version }}

archives:
  - id: fleet
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: zairedegrees
    name: fleet
